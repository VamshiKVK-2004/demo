defaults:
  seed: 42
  output_dir: outputs
  retries: 2

experiments:
  - name: gemini_free_tier
    provider: gemini
    model: gemini-1.5-pro
    temperature: 0.7
    prompt_template: prompts/creative.txt

  - name: llama_hf
    provider: huggingface
    model: meta-llama/Llama-3.1-8B-Instruct
    temperature: 0.7
    prompt_template: prompts/creative.txt

pipeline:
  stages:
    - data
    - preprocess
    - llm
    - analysis
    - metrics
    - validation
    - viz
    - dashboard
