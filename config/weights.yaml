metrics:
  stereotype_score: 0.45
  representation_balance_score: 0.25
  counterfactual_sensitivity_score: 0.30

aggregation:
  strategy: weighted_sum
  missing_metric_policy: renormalize
  threshold_flags:
    severe_bias: 0.75
    moderate_bias: 0.50
  calibration:
    enabled: true
    method: percentile
